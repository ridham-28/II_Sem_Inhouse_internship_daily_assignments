<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragistration</title>
    <link rel="stylesheet" href="style.css">
    <style>
h1{
    color:aqua ;
}
    </style>
</head>
<body id="body">
    <div>
    <form class="background"  id="frmheading">
        <h1 style="color:blue;">REGISTRATION FORM</h1>
        <p>Submit this form for online registration</p>
            
        
        <label> Name:
    <input type="text " id="txtName" required placeholder="Enter your name" />
    <br>
    <label> Email:
    <input type="email " id="txtEmail" required placeholder="Enter your Email" />
    <br>
    <label> Phone no:
        <input type="tel" id="txtPhone" required placeholder="Enter your phone number" />
        <br>
        <label>
            <input type="radio"  id="check-male" name="gender" checked />
            <label>Male</label>
            <input type="radio"  id="check-female" name="gender" checked />
            <label>Female</label>
            <input type="radio"  id="check-transgender" name="gender" checked />
            <label>Transgender</label>
            <input type="radio"  id="check-prefer not to say" name="gender" checked />
            <label>Prefer not to say</label>
            <br>
            <label>DOB:</label>
            <input type="date" id="txtDOB" name="txtDOB" required placeholder="Enter your date of birth" />
            <br>
            <label>Password:</label>
            <input type="password"  id="pwdPassword" name="pwdPassword" required placeholder="Enter your password" />
            <br>
            <label>Confirm Password:</label>
            <input type="password"  id="password" name="pwdConformPassword" required placeholder="Confirm your password" />
            <br>
            <button>submit</button>
            


        
    </form>
    </div>
</body>
</html>
