<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form action="registration.php" method="POST" onsubmit="return validateForm()">

<div class="row">

<div class="input-box">
<label>Full Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="email" name="email" placeholder="Enter your email">
</div>

<div class="input-box">
<label>Contact Number</label>
<input type="tel" id="contact" name="contact" placeholder="9876543210">
</div>

<div class="input-box">
<label>Branch</label>

<select name="branch" id="branch">

<option value="">Select Branch</option>

<option>CSE</option>

<option>IT</option>

<option>AI & DS</option>

<option>ECE</option>

<option>Mechanical</option>

<option>Civil</option>

</select>

</div>

<div class="input-box">
<label>CGPA</label>
<input type="number" step="0.01" id="cgpa" name="cgpa" placeholder="8.50">
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date" id="dob" name="dob">
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="password" name="password">
<small id="strength"></small>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" name="confirm_password">
<small id="match"></small>
</div>

</div>

<div class="gender">

<label>Gender</label>

<input type="radio" name="gender" value="Male"> Male

<input type="radio" name="gender" value="Female"> Female

<input type="radio" name="gender" value="Other"> Other

</div>

<div class="skills">

<label>Skills</label><br>

<input type="checkbox" name="skills[]" value="HTML"> HTML

<input type="checkbox" name="skills[]" value="CSS"> CSS

<input type="checkbox" name="skills[]" value="JavaScript"> JavaScript

<input type="checkbox" name="skills[]" value="PHP"> PHP

<input type="checkbox" name="skills[]" value="Python"> Python

</div>

<div class="buttons">

<button type="reset">Reset</button>

<button type="submit">Register</button>

</div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
